services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drivertime}
      POSTGRES_USER: ${POSTGRES_USER:-drivertime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drivertime_dev}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - drivertime-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/DriverTime.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-drivertime};Username=${POSTGRES_USER:-drivertime};Password=${POSTGRES_PASSWORD:-drivertime_dev}
      DddParser__PythonExecutable: python3
      DddParser__ParserScriptPath: /app/parser/parser_cli.py
      DddParser__TimeoutSeconds: 60
      Jwt__Issuer: DriverTime
      Jwt__Audience: DriverTime
      Jwt__Secret: ${JWT_SECRET:-local-docker-development-secret-change-before-deployment}
      SeedAdmin__CompanyName: DriverTime Demo
      SeedAdmin__Email: ${SEED_ADMIN_EMAIL:-admin@drivertime.local}
      SeedAdmin__Password: ${SEED_ADMIN_PASSWORD:-ChangeMe123!}
    ports:
      - "${API_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: src/DriverTime.Web/Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  drivertime-postgres:
