services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drivertime}
      POSTGRES_USER: ${POSTGRES_USER:-drivertime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - drivertime-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/DriverTime.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-drivertime};Username=${POSTGRES_USER:-drivertime};Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      DddParser__PythonExecutable: python3
      DddParser__ParserScriptPath: /app/parser/parser_cli.py
      DddParser__TimeoutSeconds: 60
      Jwt__Issuer: DriverTime
      Jwt__Audience: DriverTime
      Jwt__Secret: ${JWT_SECRET:?Set JWT_SECRET in .env}
      SeedAdmin__CompanyName: ${SEED_ADMIN_COMPANY:-DriverTime}
      SeedAdmin__Email: ${SEED_ADMIN_EMAIL:-admin@drivertime.local}
      SeedAdmin__Password: ${SEED_ADMIN_PASSWORD:?Set SEED_ADMIN_PASSWORD in .env}
      DemoData__Enabled: ${DEMO_DATA_ENABLED:-false}
      DemoData__CompanyName: ${DEMO_COMPANY_NAME:-Northline Logistics}
      DemoData__Email: ${DEMO_EMAIL:-demo@drivertime.app}
      DemoData__Password: ${DEMO_PASSWORD:-DriverTimeDemo123!}
      Cors__AllowedOrigins__0: ${PUBLIC_APP_URL:-http://localhost:8080}
    ports:
      - "${API_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: src/drivertime.web/Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  drivertime-postgres:
