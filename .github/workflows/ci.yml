name: DriverTime CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  backend:
    name: Backend build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore backend
        run: dotnet restore src/DriverTime.Api/DriverTime.Api.csproj

      - name: Build backend
        run: dotnet build src/DriverTime.Api/DriverTime.Api.csproj --configuration Release --no-restore

      - name: Find test projects
        id: tests
        shell: bash
        run: |
          if find . -path '*/bin' -prune -o -path '*/obj' -prune -o -name '*Tests.csproj' -print -quit | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run backend tests
        if: steps.tests.outputs.found == 'true'
        shell: bash
        run: |
          find . -path '*/bin' -prune -o -path '*/obj' -prune -o -name '*Tests.csproj' -print0 \
            | xargs -0 -r -n1 dotnet test --configuration Release

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/DriverTime.Web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/DriverTime.Web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
